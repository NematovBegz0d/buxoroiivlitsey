<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kurs Nazorat — Dashboard</title>
    <meta
      name="description"
      content="Kurs nazorati va davomat boshqaruvi asosiy paneli"
    />
    <link rel="icon" type="image/png" href="../imgs/logo.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="kursNazorat.css" />
    <!-- FIX #1: Font Awesome 7.0.1 mavjud emas — 6.5.2 ga o'zgartirildi -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"

  <body>
    <!-- ===== TOAST XABARLARI UCHUN KONTEYNER ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== HEADER ===== -->
    <header class="dashboard-header" id="dashboardHeader">
      <div class="header-content">
        <div class="header-left">
          <div class="header-icon">
            <i class="fa-solid fa-clipboard-list"></i>
          </div>
          <div class="header-title">
            <h1>Kurs Nazorat Tizimi</h1>
            <p>Kunlik kurs nazorati</p>
          </div>
        </div>
        <div class="header-right">
          <span class="date-badge" id="currentDate"></span>
          <button
            class="btn-primary-action role-sinf-rahbari"
            id="btnOpenEnroll"
            onclick="openEnrollModal()"
          >
            + Kursga yozish
          </button>
          <a
            href="kursgaYozilganlar.html"
            class="btn-secondary-action"
            id="btnGoToEnrolled"
          >
            <i class="fa-solid fa-file-contract"></i> Yozilganlar
          </a>
          <div class="user-badge" id="userBadge">
            <span class="role-dot"></span>
            <span id="userNameDisplay"></span>
          </div>
          <button class="btn-logout" id="btnLogout" onclick="logout()">
            Chiqish
          </button>
        </div>
      </div>
    </header>

    <!-- ===== KURS KARTALARI ===== -->
    <main class="courses-container" id="coursesContainer"></main>

    <!-- ===== KURSGA YOZISH MODALI ===== -->
    <div class="modal-overlay" id="enrollModal">
      <div class="modal-container">
        <!-- MODAL HEADER -->
        <div class="modal-header">
          <div class="modal-header-info">
            <div class="modal-header-icon">
              <i class="fa-solid fa-pen-to-square"></i>
            </div>

            <div>
              <h2>Kursga yozish</h2>
              <p id="enrollGroupName">Guruh: —</p>
            </div>
          </div>

          <button class="modal-close" onclick="closeModal('enrollModal')">
            ✕
          </button>
        </div>

        <!-- MODAL BODY -->
        <div class="modal-body">
          <!-- Guruh -->
          <div class="modal-form-group">
            <label>Guruh</label>
            <input type="text" class="form-input" id="enrollGroup" readonly />
          </div>

          <!-- Fan tanlash -->
          <div class="modal-form-group">
            <label>Fan tanlash *</label>
            <select
              id="enrollSubject"
              class="form-input"
              onchange="onSubjectChange()"
            >
              <option value="">— Fan tanlang —</option>
            </select>
          </div>

          <!-- O'qituvchi tanlash -->
          <div class="modal-form-group">
            <label>O‘qituvchi tanlash *</label>
            <select id="enrollTeacher" class="form-input">
              <option value="">— Avval fan tanlang —</option>
            </select>
          </div>

          <!-- Vaqt va hafta kunlari -->
          <div class="modal-form-row">
            <div class="modal-form-group">
              <label>Dars vaqti *</label>
              <select
                id="enrollTime"
                class="form-input"
                onchange="onTimeSelectChange()"
              >
                <option value="">— Vaqt tanlang —</option>
                <option value="14:00 - 15:30">14:00 - 15:30</option>
                <option value="15:40 - 17:10">15:40 - 17:10</option>
                <option value="16:00 - 17:30">16:00 - 17:30</option>
                <option value="17:20 - 18:50">17:20 - 18:50</option>
                <option value="__custom__">Boshqa vaqt</option>
              </select>

              <input
                type="text"
                class="form-input"
                id="enrollTimeCustom"
                placeholder="Masalan: 09:00 - 10:30"
              />
            </div>

            <div class="modal-form-group">
              <label>Hafta kunlari *</label>

              <div class="weekday-selector" id="weekdaySelector">
                <button type="button" class="weekday-btn" data-day="Dushanba">
                  Du
                </button>
                <button type="button" class="weekday-btn" data-day="Seshanba">
                  Se
                </button>
                <button type="button" class="weekday-btn" data-day="Chorshanba">
                  Cho
                </button>
                <button type="button" class="weekday-btn" data-day="Payshanba">
                  Pay
                </button>
                <button type="button" class="weekday-btn" data-day="Juma">
                  Ju
                </button>
                <button type="button" class="weekday-btn" data-day="Shanba">
                  Sha
                </button>
              </div>
            </div>
          </div>

          <!-- O'quvchilar tanlash -->
          <div class="modal-form-group">
            <label>O‘quvchilar tanlash *</label>
            <div class="student-select-list" id="enrollStudentList"></div>
          </div>
        </div>

        <!-- MODAL FOOTER -->
        <div class="modal-footer">
          <button class="btn-modal-cancel" onclick="closeModal('enrollModal')">
            Bekor qilish
          </button>

          <button
            class="btn-modal-save"
            id="btnSaveEnroll"
            onclick="saveEnrollment()"
          >
            <i class="fa-solid fa-floppy-disk"></i> Saqlash
          </button>
        </div>
      </div>
    </div>

    <!-- ===== DAVOMAT OLISH MODALI ===== -->
    <div class="modal-overlay" id="attendanceModal">
      <div class="modal-container">
        <div class="modal-header">
          <div class="modal-header-info">
            <div class="modal-header-icon">
              <i class="fa-solid fa-chart-pie"></i>
            </div>
            <div>
              <h2>Davomat qo'shish</h2>
              <p id="attendanceSubTitle">— uchun davomat</p>
            </div>
          </div>
          <button class="modal-close" onclick="closeModal('attendanceModal')">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-form-row">
            <div class="modal-form-group">
              <label>Sana *</label>
              <input type="date" id="attendanceDate" class="form-input" />
            </div>
            <div class="modal-form-group">
              <label>Para *</label>
              <select id="attendancePara" class="form-input">
                <option value="">— Tanlang —</option>
              </select>
            </div>
          </div>
          <div class="modal-form-row">
            <div class="modal-form-group">
              <label>Mashg'ulot sababi</label>
              <input
                type="text"
                id="attendanceReason"
                class="form-input"
                readonly
              />
            </div>
          </div>
          <div class="attendance-list" id="attendanceList">
            <div class="attendance-list-header">O'quvchilar ro'yxati</div>
          </div>
        </div>
        <div class="modal-footer">
          <div class="attendance-summary" id="attendanceSummary">
            <span
              >✓ Kelgan: <span class="kelgan" id="kelganCount">0</span></span

            <span
              >✕ Kelmagan:
              <span class="kelmagan" id="kelmaganCount">0</span></span
            >
          </div>
          <div>
            <button
              class="btn-modal-cancel"
              onclick="closeModal('attendanceModal')"
            >
              Bekor qilish
            </button>
            <button
              class="btn-modal-save"
              id="btnSaveAttendance"
              onclick="saveAttendance()"
            >
              <i class="fa-solid fa-floppy-disk"></i> Saqlash

          </div>
        </div>
      </div>
    </div>

    <!-- ===== BAHOLASH MODALI ===== -->
    <div class="modal-overlay" id="gradingModal">
      <div class="modal-container">
        <div class="modal-header">
          <div class="modal-header-info">
            <div class="modal-header-icon">
              <i class="fa-solid fa-star"></i>
            </div>
            <div>
              <h2>Baholash</h2>
              <p id="gradingSubTitle">— uchun baholar</p>
            </div>

          <button class="modal-close" onclick="closeModal('gradingModal')">

        </div>

          <div class="attendance-list" id="gradingList">

    <!-- ===== DAVOMAT STATISTIKA MODALI ===== -->
    <div class="modal-overlay" id="statsModal">
      <div class="modal-container">
        <div class="modal-header">
          <div class="modal-header-info">

              <i class="fa-solid fa-chart-bar"></i>

            <div>
              <h2 id="statsTitle">Davomat statistikasi</h2>
              <p id="statsSubTitle">—</p>

    <!-- ===== O'QUVCHI KURSLARI MODALI ===== -->
    <div class="modal-overlay" id="studentCoursesModal">

            </div>

            </div>

            onclick="closeModal('studentCoursesModal')"

    <!-- ===== KURS O'QUVCHILARI MODALI ===== -->
    <div class="modal-overlay" id="courseStudentsModal">
      <div class="modal-container">
        <div class="modal-header">
          <div class="modal-header-info">
            <div class="modal-header-icon" id="csmIcon">
              <i class="fa-solid fa-clipboard-list"></i>
            </div>
            <div>
              <h2 id="csmTitle">Kurs o'quvchilari</h2>
              <p id="csmSubTitle">—</p>

          </div>
          <button
            class="modal-close"
            onclick="closeModal('courseStudentsModal')"

                <label>O'quvchi qo'shish</label>

                  <option value="">— O'quvchi tanlang —</option>
                </select>

                class="btn-primary-action"
                id="btnCsmAdd"

    <!-- ===== FIREBASE ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>

    <script>
      /* ============================================================
       KURS NAZORAT — FIREBASE AUTH MOSLANGAN ASOSIY LOGIKA
       Tuzatishlar:
         1. Font Awesome 6.5.2 ishlatiladi.
         2. Mentor faqat o'z guruhi bo'yicha kursga yozadi.
         3. Fan/o'qituvchi mosligi subjectId, subjectIds va eski subject modeli bilan ishlaydi.
         4. Davomat olishda 4 xonali eski parol tekshiruvi olib tashlandi.
         5. O'qituvchi Firebase Auth orqali kirgan bo'lsa, o'z kursiga davomat saqlay oladi.
       ============================================================ */

      // ===== GLOBAL O'ZGARUVCHILAR =====
      let currentUser = null;
      let selectedWeekdays = [];
      let currentAttendanceCourse = null;
      let currentGradingCourse = null;
      let currentCourseView = null;
      let currentStatsCourse = null; // Statistika modali uchun joriy kurs
      let currentStatsMode = "weekly"; // "weekly" | "monthly"

      // ===== Fan ranglar xaritasi =====
      const subjectColors = {
        Tarix: "#00e676",
        "Ona-tili va adabiyot": "#ff9800",
        "Rus tili": "#e91e63",
        "Ingliz tili": "#448aff",
        "Fransuz tili": "#7c4dff",
        "Nemis tili": "#ff5722",
        "Informatika fani": "#00bcd4",
        "Matematika fani": "#ffc107",
        "Fizika fani": "#9c27b0",
        "Jismoniy tarbiya": "#4caf50",
        Huquqshunoslik: "#795548",
        Geografiya: "#009688",
        "Kimyo fani": "#f44336",
        "Biologiya fani": "#8bc34a",
        "Kasbiy fan": "#607d8b",
        "Maxsus fan": "#ff5252",
      };

      /* ============================================================
       YORDAMCHI FUNKSIYALAR
       ============================================================ */

      /**
       * FIX #4 — Xavfsiz noyob ID generatsiya qilish
       * Date.now() o'rniga crypto.randomUUID() ishlatiladi.
       */
      function generateId(prefix = "id") {
        const uid =
          typeof crypto !== "undefined" && crypto.randomUUID
            ? crypto.randomUUID().replace(/-/g, "")
            : Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
        return `${prefix}_${uid}`;
      }

      /**
       * Firebase/Firestore importdan keyingi IDlarni bir xil formatda ishlatish uchun.
       */
      function makeSlug(value) {
        return String(value || "")
          .toLowerCase()
          .trim()
          .replace(/[ʼ'‘’ʻ`]/g, "")
          .replace(/-/g, "_")
          .replace(/\s+/g, "_")
          .replace(/[^\w_]/g, "");
      }

      function getSubjectId(subject) {
        return String(
          subject?.docId ||
            subject?.subjectId ||
            subject?.id ||
            makeSlug(subject?.name || ""),
        );
      }

      function getTeacherId(teacher) {
        return String(
          teacher?.id ||
            teacher?.teacherId ||
            teacher?.docId ||
            teacher?.login ||
            "",
        );
      }

      function teacherMatchesSubject(teacher, subjectId, selectedSubject) {
        const sid = String(subjectId || "");
        const subjectName = selectedSubject?.name || "";
        const subjectSlug = makeSlug(subjectName);

        // Yangi model: teacher.subjectIds = ["tarix", "huquq", ...]
        if (Array.isArray(teacher.subjectIds)) {
          return teacher.subjectIds.map(String).includes(sid);
        }

        // Yangi/yordamchi model: teacher.subjectId = "tarix"
        if (teacher.subjectId) {
          return String(teacher.subjectId) === sid;
        }

        // Eski data.js modeli: teacher.subject = "Tarix"
        if (teacher.subject) {
          return (
            String(teacher.subject) === String(subjectName) ||
            makeSlug(teacher.subject) === subjectSlug ||
            makeSlug(teacher.subject) === sid
          );
        }

        return false;
      }

      function makeSafeDocId(value) {
        return makeSlug(String(value || "x")).slice(0, 90) || "x";
      }

      /**
       * FIX #5 — Tugmani yuklash holati (ikki marta bosishni oldini olish)
       */
      function setButtonLoading(btnId, isLoading, originalText) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        btn.disabled = isLoading;
        if (isLoading) {
          btn.dataset.originalText = btn.innerHTML;
          btn.innerHTML =
            '<i class="fa-solid fa-spinner fa-spin"></i> Saqlanmoqda...';
        } else {
          btn.innerHTML = btn.dataset.originalText || originalText || "Saqlash";
        }
      }

      /* ============================================================
       SAHIFA YUKLANGANDA
       ============================================================ */
      document.addEventListener("DOMContentLoaded", async () => {
        checkAuth();
        setCurrentDate();
        setupWeekdayButtons();
        const container = document.getElementById("coursesContainer");
        if (container) {
          container.innerHTML = "<div> ⏳ Ma'lumotlar yuklanmoqda...</div>";
        }

        try {
          const collections = [
            { name: "course_students", ls: "students" },
            { name: "courseAssignments", ls: "courseAssignments" },
            { name: "attendance", ls: "attendance" },
            { name: "grades", ls: "grades" },
            { name: "subjects", ls: "subjects" },
            { name: "teachers", ls: "teachers" },
            { name: "classMentors", ls: "classMentors" },
            // FIX #2 — "groups" kolleksiyasi olib tashlandi: hech qayerda ishlatilmaydi
          ];
          await Promise.all(
            collections.map(async (c) => {
              const snap = await db.collection(c.name).get();
              localStorage.setItem(
                c.ls,
                JSON.stringify(
                  snap.docs.map((d) => ({ docId: d.id, ...d.data() })),
                ),
              );
            }),
          );
        } catch (err) {
          console.error("Baza sync xatosi:", err);
          showToast("Ma'lumotlar yuklanishida xatolik", "error");
        }

        loadCourseCards();
      });

      /* ============================================================
       AUTENTIFIKATSIYA
       ============================================================ */
      function checkAuth() {
        const userData = sessionStorage.getItem("currentUser");
        if (!userData) {
          window.location.href = "login.html";
          return;
        }

        try {
          currentUser = JSON.parse(userData);
        } catch (error) {
          sessionStorage.removeItem("currentUser");
          window.location.href = "login.html";
          return;
        }

        // Admin alohida admin.html sahifasiga o'tkaziladi.
        if (currentUser.role === "admin") {
          window.location.replace("admin.html");
          return;
        }

        // Ota-ona/kuzatuvchi bu sahifaga kira olmaydi.
        if (
          currentUser.role === "observer" ||
          currentUser.role === "kuzatuvchi"
        ) {
          window.location.replace("kursgaYozilganlar.html");
          return;
        }

        updateUIForRole();
      }

      function updateUIForRole() {
        const userNameEl = document.getElementById("userNameDisplay");
        const roleDot = document.querySelector(".role-dot");
        if (!userNameEl || !roleDot || !currentUser) return;

        if (currentUser.role === "sinf_rahbari") {
          userNameEl.textContent = `${currentUser.fullName} (${currentUser.groupCode})`;
          roleDot.style.background = "var(--accent-green)";
        } else if (currentUser.role === "oqituvchi") {
          const subjectText =
            Array.isArray(currentUser.subjectIds) &&
            currentUser.subjectIds.length
              ? currentUser.subjectIds.join(", ")
              : currentUser.subject || currentUser.login || "o'qituvchi";
          userNameEl.textContent = `${currentUser.fullName} (${subjectText})`;
          roleDot.style.background = "var(--accent-blue)";
        } else if (currentUser.role === "admin") {
          userNameEl.textContent = currentUser.fullName || "Administrator";
          roleDot.style.background = "var(--accent-yellow)";
        } else {
          userNameEl.textContent = "Kuzatuvchi";
          roleDot.style.background = "var(--accent-orange)";
        }

        document.querySelectorAll(".role-sinf-rahbari").forEach((btn) => {
          btn.style.display = currentUser.role === "sinf_rahbari" ? "" : "none";
        });
      }

      async function logout() {
        try {
          sessionStorage.removeItem("currentUser");
          [
            "students",
            "groups",
            "courseAssignments",
            "attendance",
            "grades",
            "subjects",
            "teachers",
            "classMentors",
          ].forEach((key) => localStorage.removeItem(key));

          if (typeof auth !== "undefined") {
            await auth.signOut();
          } else if (typeof firebase !== "undefined" && firebase.auth) {
            await firebase.auth().signOut();
          }

          window.location.replace("login.html");
        } catch (error) {
          console.error("Logout xatosi:", error);
          sessionStorage.clear();
          window.location.replace("login.html");
        }
      }

      /* ============================================================
       SANA
       ============================================================ */
      function setCurrentDate() {
        const now = new Date();
        const day = String(now.getDate()).padStart(2, "0");
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const year = now.getFullYear();
        document.getElementById("currentDate").textContent =
          `${day}.${month}.${year}`;
        const dateInput = document.getElementById("attendanceDate");
        if (dateInput) dateInput.value = `${year}-${month}-${day}`;
      }

      function clampPercent(value) {
        const num = Math.round(Number(value) || 0);
        return Math.max(0, Math.min(100, num));
      }

      function widthClass(value) {
        return `w-${clampPercent(value)}`;
      }

      function toneClass(percent) {
        const pct = clampPercent(percent);
        if (pct >= 80) return "tone-good";
        if (pct >= 60) return "tone-warn";
        return "tone-bad";
      }

      /* ============================================================
       KURS KARTALARI
       ============================================================ */
      function loadCourseCards() {
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );
        const container = document.getElementById("coursesContainer");

        if (assignments.length === 0) {
          container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h3>Hozircha kurslar mavjud emas</h3>
            <p>Sinf rahbari o'quvchilarni kurslarga yozgandan keyin, bu yerda kurs kartalari paydo bo'ladi.</p>
          </div>`;
          return;
        }

        const courseMap = {};
        assignments.forEach((a) => {
          const key = `${a.subjectId}_${a.teacherId}_${a.classTime}`;
          if (!courseMap[key]) {
            courseMap[key] = {
              subjectId: a.subjectId,
              subjectName: a.subjectName,
              teacherId: a.teacherId,
              teacherName: a.teacherName,
              classTime: a.classTime,
              weekDays: a.weekDays || a.weekdays || [],
              students: [],
              groups: new Set(),
            };
          }
          courseMap[key].students.push({
            studentId: a.studentId,
            studentName: a.studentName,
            groupCode: a.groupCode,
          });
          courseMap[key].groups.add(a.groupCode);
        });

        let courses = Object.values(courseMap);

        if (currentUser.role === "oqituvchi") {
          courses = courses.filter(
            (c) => String(c.teacherId) === String(currentUser.id),
          );
        }

        courses.sort((a, b) => a.subjectName.localeCompare(b.subjectName));

        if (courses.length === 0) {
          container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h3>Hozircha sizga kurslar biriktirilmagan</h3>
            <p>Sinf rahbarlari o'quvchilarni sizning faningizga yozgach, bu yerda ko'rinadi.</p>
          </div>`;
          return;
        }

        const allAttendance = JSON.parse(
          localStorage.getItem("attendance") || "[]",
        );
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
        const weekDaysUz = [
          "Yakshanba",
          "Dushanba",
          "Seshanba",
          "Chorshanba",
          "Payshanba",
          "Juma",
          "Shanba",
        ];
        const todayWeekDay = weekDaysUz[now.getDay()];
        // FIX #3 — subjects bir marta o'qiladi, har karta uchun qayta o'qilmaydi
        const allSubjects = JSON.parse(
          localStorage.getItem("subjects") || "[]",
        );

        let html = '<div class="course-cards-list">';
        courses.forEach((c, i) => {
          html += renderCourseCard(
            c,
            i,
            allAttendance,
            todayStr,
            todayWeekDay,
            allSubjects,
          );
        });
        html += "</div>";
        container.innerHTML = html;
      }

      // FIX #3 — allSubjects parametr sifatida qabul qilinadi (ichida qayta o'qilmaydi)
      function renderCourseCard(
        course,
        index,
        allAttendance,
        todayStr,
        todayWeekDay,
        allSubjects,
      ) {
        const color = subjectColors[course.subjectName] || "#448aff";
        const subj = allSubjects.find(
          (s) => String(getSubjectId(s)) === String(course.subjectId),
        );
        const shortName = subj
          ? subj.shortName
          : course.subjectName.substring(0, 3).toUpperCase();
        const totalStudents = course.students.length;
        const groupsArr = [...course.groups];

        const safeClassTime = (course.classTime || "").replace(/'/g, "\\'");
        const courseTime = (course.classTime || "").trim();

        // FIX #8 — classTime bo'sh bo'lganda noto'g'ri davomat topilmasligi ta'minlandi
        const todayAttendance = allAttendance.find(
          (att) =>
            att.date === todayStr &&
            String(att.subjectId) === String(course.subjectId) &&
            String(att.teacherId) === String(course.teacherId) &&
            (att.classTime || "").trim() === courseTime,
        );

        const isTodayClass = (course.weekDays || []).includes(todayWeekDay);
        let attendanceBtnHtml = "";

        if (
          currentUser.role === "oqituvchi" &&
          String(currentUser.id) === String(course.teacherId)
        ) {
          if (!isTodayClass) {
            attendanceBtnHtml = `<button class="btn-attendance" disabled title="Bugun bu fandan dars yo'q">📅 Bugun dars yo'q</button>`;
          } else if (todayAttendance) {
            attendanceBtnHtml = `<button class="btn-attendance btn-grade" onclick="event.stopPropagation();openGradingModal('${course.subjectId}','${course.teacherId}','${safeClassTime}')"><i class="fa-solid fa-star"></i> Baholash</button>`;
          } else {
            attendanceBtnHtml = `<button class="btn-attendance" onclick="event.stopPropagation();openAttendanceModal('${course.subjectId}','${course.teacherId}','${safeClassTime}')">Davomat olish</button>`;
          }
        } else if (currentUser.role === "oqituvchi") {
          attendanceBtnHtml = `<button class="btn-attendance" disabled>Davomat olish</button>`;
        } else if (currentUser.role === "kuzatuvchi") {
          attendanceBtnHtml = `<button class="btn-attendance" disabled title="Kuzatuvchi davomat ola olmaydi">Davomat olish</button>`;
        } else {
          attendanceBtnHtml = `<button class="btn-attendance" disabled>Davomat olish</button>`;
        }

        return `
        <div class="course-card"
             onclick="openCourseStudents('${course.subjectId}','${course.teacherId}','${safeClassTime}')">
          <div class="course-card-header">
            <div class="course-card-info">
              <div class="subject-badge">${shortName}</div>
              <div>
                <div class="course-card-name">${course.subjectName} (${course.teacherName})</div>
                <div class="course-card-teacher">${course.classTime || ""}</div>
              </div>
            </div>
            <div class="course-card-count">jami: ${totalStudents}</div>
          </div>
          <div class="course-card-details">
            ${course.classTime ? `<span class="detail-chip"><span class="chip-icon">🕐</span> ${course.classTime}</span>` : ""}
            ${(course.weekDays || []).map((d) => `<span class="detail-chip">${d}</span>`).join("")}
            <span class="detail-chip">${groupsArr.length} ta guruh</span>
          </div>
          <div class="course-card-footer">
            <div class="groups-enrolled">
              ${groupsArr.map((g) => `<span class="group-mini-badge">${g}</span>`).join("")}
            </div>
            <div class="course-card-actions">
              <button class="btn-stats" onclick="event.stopPropagation();openStatsModal('${course.subjectId}','${course.teacherId}','${safeClassTime}')">
                <i class="fa-solid fa-chart-bar"></i> Statistika
              </button>
              ${attendanceBtnHtml}
            </div>
          </div>
        </div>`;
      }

      /* ============================================================
       KURS O'QUVCHILARI MODALI
       ============================================================ */
      function openCourseStudents(subjectId, teacherId, classTime) {
        const subjects = JSON.parse(localStorage.getItem("subjects") || "[]");
        const teachers = JSON.parse(localStorage.getItem("teachers") || "[]");
        const subject = subjects.find(
          (s) => String(getSubjectId(s)) === String(subjectId),
        );
        const teacher = teachers.find(
          (t) => String(getTeacherId(t)) === String(teacherId),
        );
        if (!subject || !teacher) return;

        currentCourseView = {
          subjectId,
          teacherId,
          classTime,
          subjectName: subject.name,
          teacherName: teacher.fullName,
        };

        const color = subjectColors[subject.name] || "#448aff";
        document.getElementById("csmIcon").style.background = color;
        document.getElementById("csmTitle").textContent = subject.name;
        document.getElementById("csmSubTitle").textContent =
          `O'qituvchi: ${teacher.fullName} | ${classTime || ""}`;

        renderCourseStudentsList(subjectId, teacherId, classTime);

        const addSection = document.getElementById("csmAddSection");
        if (currentUser.role === "sinf_rahbari") {
          addSection.style.display = "block";
          loadAddStudentOptions(subjectId, teacherId, classTime);
        } else {
          addSection.style.display = "none";
        }

        openModal("courseStudentsModal");
      }

      function renderCourseStudentsList(subjectId, teacherId, classTime) {
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );
        const courseStudents = assignments.filter(
          (a) =>
            String(a.subjectId) === String(subjectId) &&
            String(a.teacherId) === String(teacherId) &&
            (a.classTime || "") === (classTime || ""),
        );
        const listEl = document.getElementById("csmStudentsList");

        if (courseStudents.length === 0) {
          listEl.innerHTML =
            "<div class=\"table-empty\">Bu kursda hali o'quvchilar yo'q.</div>";
          return;
        }

        const safeTime = (classTime || "").replace(/'/g, "\\'");
        let html = "";
        courseStudents.forEach((s, i) => {
          const deleteBtn =
            currentUser.role === "sinf_rahbari"
              ? `<button class="btn-remove-student" onclick="event.stopPropagation();removeStudentFromCourse('${s.studentId}','${subjectId}','${teacherId}','${safeTime}')" title="O'chirish">✕</button>`
              : "";
          html += `
          <div class="csm-student-item">
            <div class="csm-student-num">${String(i + 1).padStart(2, "0")}</div>
            <div class="csm-student-info">
              <div class="csm-student-name">${s.studentName}</div>
              <div class="csm-student-group">${s.groupCode}-guruh</div>
            </div>
            ${deleteBtn}
          </div>`;
        });

        listEl.innerHTML = `
        <div class="csm-header-row"><span>Jami: ${courseStudents.length} ta o'quvchi</span></div>
        ${html}`;
      }

      async function removeStudentFromCourse(
        studentId,
        subjectId,
        teacherId,
        classTime,
      ) {
        if (!confirm("Bu o'quvchini kursdan o'chirishni tasdiqlaysizmi?"))
          return;

        let assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );
        const target = assignments.find(
          (a) =>
            String(a.studentId) === String(studentId) &&
            String(a.subjectId) === String(subjectId) &&
            String(a.teacherId) === String(teacherId) &&
            (a.classTime || "") === (classTime || ""),
        );

        if (target) {
          try {
            await db.collection("courseAssignments").doc(target.id).delete();
            assignments = assignments.filter((a) => a.id !== target.id);
            localStorage.setItem(
              "courseAssignments",
              JSON.stringify(assignments),
            );
            renderCourseStudentsList(subjectId, teacherId, classTime);
            loadAddStudentOptions(subjectId, teacherId, classTime);
            loadCourseCards();
            showToast("O'quvchi kursdan o'chirildi", "success");
          } catch (err) {
            showToast("O'chirishda xatolik: " + err.message, "error");
          }
        }
      }

      function loadAddStudentOptions(subjectId, teacherId, classTime) {
        if (currentUser.role !== "sinf_rahbari") return;

        const allStudents = JSON.parse(
          localStorage.getItem("students") || "[]",
        );
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );
        const groupStudents = allStudents
          .filter((s) => String(s.groupCode) === String(currentUser.groupCode))
          .sort((a, b) => a.fullName.localeCompare(b.fullName));

        const enrolledIds = assignments
          .filter(
            (a) =>
              String(a.subjectId) === String(subjectId) &&
              String(a.teacherId) === String(teacherId) &&
              (a.classTime || "") === (classTime || ""),
          )
          .map((a) => a.studentId);

        const enrolledInOtherTeacher = assignments
          .filter(
            (a) =>
              String(a.subjectId) === String(subjectId) &&
              String(a.teacherId) !== String(teacherId),
          )
          .map((a) => a.studentId);

        const available = groupStudents.filter(
          (s) =>
            !enrolledIds.map(String).includes(String(s.id)) &&
            !enrolledInOtherTeacher.map(String).includes(String(s.id)),
        );

        const select = document.getElementById("csmAddStudentSelect");
        select.innerHTML = '<option value="">— O\'quvchi tanlang —</option>';
        available.forEach((s) => {
          select.innerHTML += `<option value="${s.id}" data-name="${s.fullName}">${s.fullName}</option>`;
        });
      }

      // FIX #6 — async qilindi, try/catch va tugma bloklash qo'shildi
      async function addStudentToCourse() {
        if (!currentCourseView || currentUser.role !== "sinf_rahbari") return;

        const select = document.getElementById("csmAddStudentSelect");
        const studentId = select.value;
        if (!studentId) {
          showToast("O'quvchi tanlang!", "error");
          return;
        }

        const studentName = select.options[select.selectedIndex].dataset.name;
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );

        const inOtherTeacher = assignments.find(
          (a) =>
            String(a.studentId) === String(studentId) &&
            String(a.subjectId) === String(currentCourseView.subjectId) &&
            String(a.teacherId) !== String(currentCourseView.teacherId),
        );
        if (inOtherTeacher) {
          showToast(
            `Bu o'quvchi ${currentCourseView.subjectName} faniga ${inOtherTeacher.teacherName} ga yozilgan!`,
            "error",
          );
          return;
        }

        const existingCourse = assignments.find(
          (a) =>
            String(a.subjectId) === String(currentCourseView.subjectId) &&
            String(a.teacherId) === String(currentCourseView.teacherId) &&
            (a.classTime || "") === (currentCourseView.classTime || ""),
        );

        const newAssignment = {
          id: generateId("ca"),
          studentId: studentId,
          studentName: studentName,
          groupCode: currentUser.groupCode,
          subjectId: currentCourseView.subjectId,
          subjectName: currentCourseView.subjectName,
          teacherId: currentCourseView.teacherId,
          teacherName: currentCourseView.teacherName,
          classTime:
            currentCourseView.classTime ||
            (existingCourse ? existingCourse.classTime : ""),
          weekDays: existingCourse ? existingCourse.weekDays : [],
          createdBy: currentUser.login,
          createdAt: new Date().toISOString().split("T")[0],
        };

        setButtonLoading("btnCsmAdd", true);
        try {
          await db
            .collection("courseAssignments")
            .doc(newAssignment.id)
            .set(newAssignment);
          assignments.push(newAssignment);
          localStorage.setItem(
            "courseAssignments",
            JSON.stringify(assignments),
          );
          renderCourseStudentsList(
            currentCourseView.subjectId,
            currentCourseView.teacherId,
            currentCourseView.classTime,
          );
          loadAddStudentOptions(
            currentCourseView.subjectId,
            currentCourseView.teacherId,
            currentCourseView.classTime,
          );
          loadCourseCards();
          showToast(`${studentName} kursga qo'shildi!`, "success");
        } catch (err) {
          showToast("Qo'shishda xatolik: " + err.message, "error");
        } finally {
          setButtonLoading("btnCsmAdd", false);
        }
      }

      function loadSubjectOptions() {
        const subjects = JSON.parse(localStorage.getItem("subjects") || "[]");
        const select = document.getElementById("enrollSubject");

        select.innerHTML = '<option value="">— Fan tanlang —</option>';

        subjects
          .sort((a, b) =>
            String(a.name || "").localeCompare(String(b.name || ""), "uz"),
          )
          .forEach((s) => {
            const subjectId = getSubjectId(s);
            select.innerHTML += `<option value="${subjectId}">${s.name || subjectId}</option>`;
          });
      }

      function onSubjectChange() {
        const subjectId = document.getElementById("enrollSubject").value;
        const teacherSelect = document.getElementById("enrollTeacher");

        teacherSelect.innerHTML = `<option value="">— O\'qituvchi tanlang —</option>`;

        if (!subjectId) {
          teacherSelect.innerHTML =
            '<option value="">— Avval fan tanlang —</option>';
          return;
        }

        const subjects = JSON.parse(localStorage.getItem("subjects") || "[]");
        const teachers = JSON.parse(localStorage.getItem("teachers") || "[]");

        const selectedSubject = subjects.find(
          (s) => String(getSubjectId(s)) === String(subjectId),
        );

        if (!selectedSubject) {
          teacherSelect.innerHTML = `<option value="">Fan ma\'lumoti topilmadi</option>`;
          return;
        }

        const matchedTeachers = teachers.filter((t) =>
          teacherMatchesSubject(t, subjectId, selectedSubject),
        );

        if (!matchedTeachers.length) {
          teacherSelect.innerHTML = `<option value="">Bu fan bo'yicha o\'qituvchi topilmadi</option>`;
          return;
        }

        matchedTeachers.forEach((t) => {
          const option = document.createElement("option");
          option.value = getTeacherId(t);
          option.textContent = `${t.fullName || t.login || getTeacherId(t)} (${t.badgeLabel || t.login || "o‘qituvchi"})`;
          teacherSelect.appendChild(option);
        });
      }

      function loadStudentsList() {
        const students = JSON.parse(localStorage.getItem("students") || "[]");
        const groupStudents = students
          .filter((s) => String(s.groupCode) === String(currentUser.groupCode))

        let html = `

          <span class="count" id="selectedCount">0 / ${groupStudents.length}</span>
        </div>`;

        groupStudents.forEach((s) => {
          html += `
          <div class="student-select-item">

            <div class="student-info"><div class="s-name">${s.fullName}</div></div>
          </div>`;

      // FIX #6 — async + try/catch + tugma bloklash qo'shildi
      async function saveEnrollment() {
        if (!currentUser || currentUser.role !== "sinf_rahbari") {
          showToast("Faqat sinf rahbari kursga yozishi mumkin.", "error");
          return;
        }

        const subjectId = document.getElementById("enrollSubject").value;
        const teacherId = document.getElementById("enrollTeacher").value;
        const classTime = getSelectedTime();

        if (!subjectId) {
          showToast("Iltimos, fan tanlang!", "error");
          return;
        }
        if (!teacherId) {
          showToast("Iltimos, o'qituvchi tanlang!", "error");
          return;
        }
        if (!classTime) {
          showToast("Iltimos, dars vaqtini tanlang!", "error");
          return;
        }
        if (!selectedWeekdays || selectedWeekdays.length === 0) {
          showToast("Kamida bitta hafta kunini tanlang!", "error");
          return;
        }

        const checkedBoxes = document.querySelectorAll(
          ".student-checkbox:checked",
        );
        if (checkedBoxes.length === 0) {
          showToast("Kamida bitta o‘quvchi tanlang!", "error");
          return;
        }

        const students = JSON.parse(localStorage.getItem("students") || "[]");
        const subjects = JSON.parse(localStorage.getItem("subjects") || "[]");
        const teachers = JSON.parse(localStorage.getItem("teachers") || "[]");
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );

        const subject = subjects.find(
          (s) => String(getSubjectId(s)) === String(subjectId),
        );
        const teacher = teachers.find(
          (t) => String(getTeacherId(t)) === String(teacherId),
        );

        if (!subject) {
          showToast("Fan ma’lumoti topilmadi.", "error");
          return;
        }
        if (!teacher) {
          showToast("O‘qituvchi ma’lumoti topilmadi.", "error");
          return;
        }

        setButtonLoading("btnSaveEnroll", true);

        try {
          const batch = db.batch();
          let newCount = 0;
          let skipCount = 0;

          checkedBoxes.forEach((cb) => {
            const studentId = cb.value;
            const student = students.find(
              (s) => String(s.id) === String(studentId),
            );

            if (!student) {
              skipCount++;
              return;
            }

            // Mentor faqat o‘z guruhidagi o‘quvchini yozishi mumkin.
            if (String(student.groupCode) !== String(currentUser.groupCode)) {
              skipCount++;
              return;
            }

            // Duplicate: o‘quvchi + fan + o‘qituvchi + vaqt.
            const alreadyExists = assignments.some(
              (a) =>
                String(a.studentId) === String(student.id) &&
                String(a.subjectId) === String(subjectId) &&
                String(a.teacherId) === String(teacherId) &&
                String(a.classTime) === String(classTime),
            );

            // Agar sizda bir o‘quvchi bitta fandan faqat bitta o‘qituvchida bo‘lishi shart bo‘lsa, bu blok qoladi.
            const inOtherTeacher = assignments.find(
              (a) =>
                String(a.studentId) === String(student.id) &&
                String(a.subjectId) === String(subjectId) &&
                String(a.teacherId) !== String(teacherId),
            );

            if (alreadyExists || inOtherTeacher) {
              skipCount++;
              return;
            }

            const docId = `ca_${makeSafeDocId(student.id)}_${makeSafeDocId(subjectId)}_${makeSafeDocId(teacherId)}_${makeSafeDocId(classTime)}`;

            const newAssignment = {
              id: docId,

              studentId: String(student.id),
              studentName: student.fullName || cb.dataset.name || "",
              studentNumber: student.studentNumber || "",
              groupCode: String(student.groupCode),

              subjectId: String(subjectId),
              subjectName:
                subject.name || subject.shortName || String(subjectId),

              teacherId: String(teacherId),
              teacherName:
                teacher.fullName || teacher.login || String(teacherId),
              teacherLogin: teacher.login || "",

              classTime: classTime,

              // Eski/yangi kodlar bir xil ishlashi uchun ikkalasi ham yoziladi.
              weekDays: [...selectedWeekdays],
              weekdays: [...selectedWeekdays],

              createdBy: currentUser.login,
              createdByUid: currentUser.uid || "",
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              active: true,
            };

            assignments.push({
              ...newAssignment,
              createdAt: new Date().toISOString(),
            });

            batch.set(
              db.collection("courseAssignments").doc(docId),
              newAssignment,
              { merge: true },
            );

            newCount++;
          });

          if (newCount === 0) {
            showToast(

      async function saveAttendance() {

          reason: reason,

          confirmedBy: currentUser.login,
          confirmedByUid: currentUser.uid || "",
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        };

        setButtonLoading("btnSaveAttendance", true);

        try {
          const attendance = JSON.parse(
            localStorage.getItem("attendance") || "[]",
          );

          const existIndex = attendance.findIndex(
            (a) =>
              a.date === date &&
              String(a.subjectId) ===
                String(currentAttendanceCourse.subjectId) &&
              String(a.teacherId) === String(currentUser.id) &&

              createdAt: new Date().toISOString(),
            };

            });

          await db
            .collection("attendance")
            .doc(attendanceRecord.id)

          closeModal("attendanceModal");
          currentAttendanceCourse = null;

          const kelgan = records.filter((r) => r.status === "kelgan").length;

            (r) => r.status === "kelmagan",

          showToast(

            "success",

          console.error(err);
          showToast("Davomat saqlashda xatolik: " + err.message, "error");
        } finally {
          setButtonLoading("btnSaveAttendance", false);
        }

      /* ============================================================

       ============================================================ */

      /** Haftalik yoki oylik sana oralig'ini qaytaradi */
      function getStatsDateRange(mode) {
        const now = new Date();
        const today = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
        );

        if (mode === "weekly") {
          // To'liq hafta: Dushanba → Yakshanba.
          // Shunda haftada 3 ta dars bo'lsa, bugun seshanba bo'lsa ham "Jami: 3" chiqadi.
          const dow = today.getDay(); // 0=Yakshanba ... 6=Shanba
          const diff = dow === 0 ? -6 : 1 - dow;
          const monday = new Date(today);
          monday.setDate(today.getDate() + diff);

          const sunday = new Date(monday);
          sunday.setDate(monday.getDate() + 6);

          return { start: monday, end: sunday };
        } else {
          // Oylik statistika: oyning 1-kunidan bugungacha.
          const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
          return { start: firstDay, end: today };
        }
      }

      /** Date obyektini "YYYY-MM-DD" formatga o'tkazadi */
      function dateToStr(d) {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      /** Berilgan oraliqda o'quv kunlari (weekDays ga mos) sonini hisoblaydi */
      const UZ_DAYS = [
        "Yakshanba",
        "Dushanba",
        "Seshanba",
        "Chorshanba",
        "Payshanba",
        "Juma",
        "Shanba",
      ];
      function countExpectedSessions(weekDays, startDate, endDate) {
        if (!weekDays || weekDays.length === 0) return 0;
        let count = 0;
        const d = new Date(startDate);
        while (d <= endDate) {
          if (weekDays.includes(UZ_DAYS[d.getDay()])) count++;
          d.setDate(d.getDate() + 1);
        }
        return count;
      }

      /** Statistika modalini ochadi */
      function openStatsModal(subjectId, teacherId, classTime) {
        const subjects = JSON.parse(localStorage.getItem("subjects") || "[]");
        const teachers = JSON.parse(localStorage.getItem("teachers") || "[]");
        const subject = subjects.find(
          (s) => String(getSubjectId(s)) === String(subjectId),
        );
        const teacher = teachers.find(
          (t) => String(getTeacherId(t)) === String(teacherId),
        );

        currentStatsCourse = { subjectId, teacherId, classTime };
        currentStatsMode = "weekly";

        // Sarlavha
        const color = subjectColors[subject?.name] || "#448aff";
        const iconEl = document.getElementById("statsIcon");
        iconEl.style.background = color + "22";
        iconEl.innerHTML = `<i class="fa-solid fa-chart-bar"></i>`;
        document.getElementById("statsTitle").textContent =
          subject?.name || "Kurs statistikasi";
        document.getElementById("statsSubTitle").textContent =
          `${teacher?.fullName || ""} | ${classTime || ""}`;

        // Tablarni reset qilish
        document.getElementById("tabWeekly").classList.add("active");
        document.getElementById("tabMonthly").classList.remove("active");

        renderStats("weekly");
        openModal("statsModal");
      }

      /** Tab almashganda chaqiriladi */
      function switchStatsTab(mode) {
        currentStatsMode = mode;
        document
          .getElementById("tabWeekly")
          .classList.toggle("active", mode === "weekly");
        document
          .getElementById("tabMonthly")
          .classList.toggle("active", mode === "monthly");
        renderStats(mode);
      }

      /** Haftalik / oylik statistikani hisoblaydi va chiqaradi */
      function renderStats(mode) {
        if (!currentStatsCourse) return;
        const { subjectId, teacherId, classTime } = currentStatsCourse;

        const { start, end } = getStatsDateRange(mode);
        const startStr = dateToStr(start);
        const endStr = dateToStr(end);

        const allAttendance = JSON.parse(
          localStorage.getItem("attendance") || "[]",
        );
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );

        // Bu kursga tegishli o'quvchilar
        const courseStudents = assignments.filter(
          (a) =>
            String(a.subjectId) === String(subjectId) &&
            String(a.teacherId) === String(teacherId) &&
            (a.classTime || "").trim() === (classTime || "").trim(),
        );

        // Kurs hafta kunlari (birinchi yozuvdan olinadi)
        const weekDays =
          courseStudents[0]?.weekDays || courseStudents[0]?.weekdays || [];

        // Ushbu kursning davomat yozuvlari, sanasi oraliqda
        const courseAttRecs = allAttendance.filter(
          (att) =>
            String(att.subjectId) === String(subjectId) &&
            String(att.teacherId) === String(teacherId) &&
            (att.classTime || "").trim() === (classTime || "").trim() &&
            att.date >= startStr &&
            att.date <= endStr,
        );

        // Kutilgan va o'tkazilgan darslar
        const scheduledSessions = countExpectedSessions(weekDays, start, end);
        const heldDates = new Set(courseAttRecs.map((a) => a.date));
        const heldSessions = heldDates.size;
        const expectedSessions = Math.max(scheduledSessions, heldSessions);
        const unrecordedSessions = Math.max(expectedSessions - heldSessions, 0);

        // Har o'quvchi uchun statistika
        const studentStats = {};
        const seenIds = new Set();
        courseStudents.forEach((s) => {
          if (!seenIds.has(s.studentId)) {
            seenIds.add(s.studentId);
            studentStats[s.studentId] = {
              studentId: s.studentId,
              studentName: s.studentName,
              groupCode: s.groupCode,
              attended: 0,
              missed: 0,
            };
          }
        });

        // Davomat yozuvlaridan hisoblash
        courseAttRecs.forEach((att) => {
          (att.records || []).forEach((r) => {
            if (studentStats[r.studentId]) {
              if (r.status === "kelgan") studentStats[r.studentId].attended++;
              else studentStats[r.studentId].missed++;
            }
          });
        });

        // Davomat % bo'yicha saralash (yuqoridan pastga)
        const statsArr = Object.values(studentStats).sort(
          (a, b) => b.attended - a.attended,
        );

        // ---- XULOSA ----
        const periodLabel = mode === "weekly" ? "Bu hafta" : "Bu oy";
        const pctHeld =
          expectedSessions > 0
            ? Math.round((heldSessions / expectedSessions) * 100)
            : 0;
        const heldTone = toneClass(pctHeld);
        const unrecordedTone =
          unrecordedSessions > 0 ? "tone-warn" : "tone-good";

        document.getElementById("statsSummary").innerHTML = `
        <div class="stats-summary-cards stats-summary-cards-4">
          <div class="stats-summary-card">
            <div class="stats-summary-num">${expectedSessions}</div>
            <div class="stats-summary-label">${periodLabel} jami dars</div>
          </div>
          <div class="stats-summary-card">
            <div class="stats-summary-num ${heldTone}">${heldSessions}</div>
            <div class="stats-summary-label">Davomat olingan</div>
          </div>
          <div class="stats-summary-card">
            <div class="stats-summary-num ${unrecordedTone}">${unrecordedSessions}</div>
            <div class="stats-summary-label">Olinmagan dars</div>
          </div>
          <div class="stats-summary-card">
            <div class="stats-summary-num">${courseStudents.length}</div>
            <div class="stats-summary-label">Jami o'quvchi</div>
          </div>
        </div>`;

        // ---- JADVAL ----
        if (heldSessions === 0) {
          document.getElementById("statsTable").innerHTML = `
          <div class="table-empty">
            📭 ${periodLabel} hali davomat qayd qilinmagan.
          </div>`;
          return;
        }

        let rows = "";
        statsArr.forEach((st, i) => {
          const unrecorded = Math.max(
            expectedSessions - st.attended - st.missed,
            0,
          );
          const pct =
            expectedSessions > 0
              ? Math.round((st.attended / expectedSessions) * 100)
              : 0;
          const tone = toneClass(pct);
          rows += `
          <tr>
            <td>${String(i + 1).padStart(2, "0")}</td>
            <td class="stats-cell-name">${st.studentName}</td>
            <td class="stats-cell-group">${st.groupCode}</td>
            <td class="stats-cell-present">${st.attended}</td>
            <td class="stats-cell-absent">${st.missed}</td>
            <td class="stats-cell-unrecorded">${unrecorded}</td>
            <td>
              <div class="stats-pct-bar-wrap">
                <div class="stats-pct-bar-bg">
                  <div class="stats-pct-bar-fill ${widthClass(pct)} ${tone}"></div>
                </div>
                <span class="stats-pct-label ${tone}">${pct}%</span>
              </div>
            </td>
          </tr>`;
        });

        document.getElementById("statsTable").innerHTML = `
        <table class="stats-table">
          <thead>
            <tr>
              <th>#</th>
              <th>O'quvchi</th>
              <th>Guruh</th>
              <th>Keldi</th>
              <th>Kelmadi</th>
              <th>Olinmagan</th>
              <th>Davomat %</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
      }

      /* ============================================================

       ============================================================ */
      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const icons = {
          success: '<i class="fa-solid fa-circle-check"></i>',
          error: '<i class="fa-solid fa-circle-xmark"></i>',
          info: '<i class="fa-solid fa-circle-info"></i>',
        };
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span class="toast-icon">${icons[type] || icons.info}</span><span>${message}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateX(100px)";
          toast.style.transition = "all 0.3s ease";
          setTimeout(() => toast.remove(), 300);
        }, 4000);
      }
    </script>
  </body>
</html>
