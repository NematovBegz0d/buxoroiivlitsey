<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kurslarga Yozilganlar — Kurs Nazorat Tizimi</title>
    <meta
      name="description"
      content="Guruhlar bo'yicha kurslarga yozilgan o'quvchilar ro'yxati"
    />
    <link rel="icon" type="image/png" href="../imgs/logo.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="kursgaYozilganlar.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- ===== TOAST XABARLARI UCHUN KONTEYNER ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== HEADER ===== -->
    <header class="dashboard-header">
      <div class="header-content">
        <div class="header-left">
          <div class="header-icon">
            <i class="fa-solid fa-file-contract"></i>
          </div>
          <div class="header-title">
            <h1>Kurslarga Yozilganlar</h1>
            <p>Guruhlar bo'yicha kurs ro'yxati</p>
          </div>
        </div>

        <div class="header-right">
          <!-- Qidiruv maydoni -->
          <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="O'quvchi izlash..."
              autocomplete="off"
            />
            <div class="search-results" id="searchResults"></div>
          </div>

          <span class="date-badge" id="currentDate"></span>

          <!-- Kursga yozish tugmasi (kuzatuvchi ko'rmaydi) -->
          <button
            class="btn-primary-action"
            id="btnEnrollFromHere"
            onclick="goToKursNazorat()"
          >
            + Kursga yozish
          </button>

          <!-- Kurs nazoratga qaytish (kuzatuvchi ko'rmaydi) -->
          <a
            href="kursNazorat.html"
            class="btn-secondary-action"
            id="btnGoToNazorat"
          >
            <i class="fa-solid fa-clipboard-list"></i> Kurs Nazorat
          </a>

          <!-- Admin paneli -->
          <a href="admin.html" class="btn-admin-action" id="btnGoAdmin">
            <i class="fa-solid fa-user-shield"></i> Admin
          </a>

          <!-- Foydalanuvchi badge -->
          <div class="user-badge" id="userBadge">
            <span class="role-dot"></span>
            <span id="userNameDisplay"></span>
          </div>

          <button class="btn-logout" onclick="logout()">Chiqish</button>
        </div>
      </div>
    </header>

    <!-- ===== GURUHLAR ===== -->
    <main class="groups-container" id="groupsContainer">
      <!-- 1-KURSLAR -->
      <div class="groups-section-title">
        1-Kurslar
        <span class="badge">101-108</span>
      </div>
      <div class="groups-grid" id="groups1Grid"></div>
      <div class="group-table-wrapper" id="tableWrapper1"></div>

      <!-- 2-KURSLAR -->
      <div class="groups-section-title">
        2-Kurslar
        <span class="badge">201-208</span>
      </div>
      <div class="groups-grid" id="groups2Grid"></div>
      <div class="group-table-wrapper" id="tableWrapper2"></div>
    </main>

    <!-- ===== O'QUVCHI KURSLARI MODALI ===== -->
    <div class="modal-overlay" id="studentDetailModal">
      <div class="modal-container">
        <div class="modal-header">
          <div class="modal-header-info">
            <div class="modal-header-icon">
              <i class="fa-solid fa-user"></i>
            </div>
            <div>
              <h2 id="sdmStudentName">O'quvchi</h2>
              <p id="sdmStudentGroup">Guruh: —</p>
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 10px">
            <span class="date-badge" id="sdmTodayDate"></span>
            <button
              class="modal-close"
              onclick="closeModal('studentDetailModal')"
            >
              ✕
            </button>
          </div>
        </div>
        <div class="modal-body">
          <div id="sdmCoursesContent"></div>
        </div>
      </div>
    </div>

    <!-- ===== GURUH KURSI STATISTIKA MODALI ===== -->
    <div class="modal-overlay" id="gcStatsModal">
      <div class="modal-container">
        <div class="modal-header">
          <div class="modal-header-info">
            <div class="modal-header-icon" id="gcStatsIcon">
              <i class="fa-solid fa-chart-bar"></i>
            </div>
            <div>
              <h2 id="gcStatsTitle">Kurs davomati statistikasi</h2>
              <p id="gcStatsSubTitle">—</p>
            </div>
          </div>
          <button class="modal-close" onclick="closeModal('gcStatsModal')">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <div class="gcs-tabs">
            <button
              class="gcs-tab active"
              id="gcTabWeekly"
              onclick="switchGcTab('weekly')"
            >
              📅 Bu hafta
            </button>
            <button
              class="gcs-tab"
              id="gcTabMonthly"
              onclick="switchGcTab('monthly')"
            >
              📆 Bu oy
            </button>
          </div>
          <div id="gcStatsSummary"></div>
          <div id="gcStatsTable"></div>
        </div>
      </div>
    </div>

    <!-- ===== FIREBASE ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>

    <script>
      /* ============================================================
       KURSGAYOZILGANLAR — ASOSIY LOGIKA
       Bu sahifa faqat ko'rish uchun. Yozish/o'zgartirish kursNazorat.html
       va admin.html sahifalarida bajariladi.
       ============================================================ */

      // ===== GLOBAL O'ZGARUVCHILAR =====
      let currentUser = null;
      let activeTableGroup = null;
      let currentGcCourse = null;
      let currentGcMode = "weekly";

      // ===== FOIZ YORDAMCHILARI =====
      function clampPercent(value) {
        return Math.max(0, Math.min(100, Math.round(Number(value) || 0)));
      }
      function widthClass(value) {
        return `w-${clampPercent(value)}`;
      }
      function toneClass(percent) {
        const p = clampPercent(percent);
        if (p >= 80) return "tone-good";
        if (p >= 60) return "tone-warn";
        return "tone-bad";
      }

      // ===== ID NORMALIZATSIYA HELPERS =====
      function makeSlug(value) {
        return String(value || "")
          .toLowerCase()
          .trim()
          .replace(/[ʼ'''ʻ`]/g, "")
          .replace(/-/g, "_")
          .replace(/\s+/g, "_")
          .replace(/[^\w_]/g, "");
      }
      function getSubjectId(subject) {
        return String(
          subject?.docId ||
            subject?.subjectId ||
            subject?.id ||
            makeSlug(subject?.name || ""),
        );
      }
      function getTeacherId(teacher) {
        return String(
          teacher?.id ||
            teacher?.teacherId ||
            teacher?.docId ||
            teacher?.login ||
            "",
        );
      }

      // ===== SAHIFA YUKLANGANDA =====
      document.addEventListener("DOMContentLoaded", async () => {
        checkAuth();
        setCurrentDate();
        setupSearch();

        const container = document.getElementById("groupsContainer");
        if (container) {
          container.insertAdjacentHTML(
            "afterbegin",
            '<div id="fbLoad" style="text-align:center;padding:20px;color:#666;"><i class="fas fa-spinner fa-spin"></i> Ma\'lumotlar yuklanmoqda...</div>',
          );
        }

        try {
          const collections = [
            { name: "course_students", ls: "students" },
            { name: "courseAssignments", ls: "courseAssignments" },
            { name: "attendance", ls: "attendance" },
            { name: "grades", ls: "grades" },
            { name: "subjects", ls: "subjects" },
            { name: "teachers", ls: "teachers" },
            { name: "classMentors", ls: "classMentors" },
          ];
          await Promise.all(
            collections.map(async (c) => {
              const snap = await db.collection(c.name).get();
              localStorage.setItem(
                c.ls,
                JSON.stringify(
                  snap.docs.map((d) => ({ docId: d.id, ...d.data() })),
                ),
              );
            }),
          );
        } catch (err) {
          console.error("Firebase sync xatosi:", err);
          showToast("Ma'lumotlar yuklanishida xatolik yuz berdi.", "error");
        }

        const loadEl = document.getElementById("fbLoad");
        if (loadEl) loadEl.remove();

        renderGroupCards();
      });

      /* ============================================================
       AUTENTIFIKATSIYA
       ============================================================ */

      function checkAuth() {
        const userData = sessionStorage.getItem("currentUser");

        // Bu sahifa ota-ona/kuzatuvchi uchun ham ochiq.
        // Session bo'lmasa — avtomatik observer rejimida ishlaydi.
        if (!userData) {
          currentUser = {
            uid: "public_observer",
            email: "",
            role: "observer",
            login: "observer",
            fullName: "Kuzatuvchi",
            groupCode: "",
            subjectIds: [],
            active: true,
          };
          sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
          updateUIForRole();
          return;
        }

        try {
          currentUser = JSON.parse(userData);
        } catch (e) {
          sessionStorage.removeItem("currentUser");
          currentUser = {
            role: "observer",
            fullName: "Kuzatuvchi",
            active: true,
          };
          sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
        }

        updateUIForRole();
      }

      function updateUIForRole() {
        const userNameEl = document.getElementById("userNameDisplay");
        const roleDot = document.querySelector(".role-dot");
        if (!userNameEl || !roleDot || !currentUser) return;

        if (currentUser.role === "sinf_rahbari") {
          userNameEl.textContent = `${currentUser.fullName} (${currentUser.groupCode})`;
          roleDot.style.background = "var(--accent-green)";
        } else if (currentUser.role === "oqituvchi") {
          const subjectText =
            Array.isArray(currentUser.subjectIds) &&
            currentUser.subjectIds.length
              ? currentUser.subjectIds.join(", ")
              : currentUser.subject || currentUser.login || "o'qituvchi";
          userNameEl.textContent = `${currentUser.fullName} (${subjectText})`;
          roleDot.style.background = "var(--accent-blue)";
        } else if (currentUser.role === "admin") {
          userNameEl.textContent = currentUser.fullName || "Administrator";
          roleDot.style.background = "var(--accent-yellow)";
        } else {
          userNameEl.textContent = "Kuzatuvchi";
          roleDot.style.background = "var(--accent-orange)";
        }

        // Tugmalarni rol bo'yicha ko'rsatish/yashirish
        const isObserver =
          currentUser.role === "observer" || currentUser.role === "kuzatuvchi";
        const btnEnroll = document.getElementById("btnEnrollFromHere");
        const btnNazorat = document.getElementById("btnGoToNazorat");
        const btnAdmin = document.querySelector(".btn-admin-action");

        if (isObserver) {
          if (btnEnroll) btnEnroll.style.display = "none";
          if (btnNazorat) btnNazorat.style.display = "none";
          if (btnAdmin) btnAdmin.style.display = "none";
        } else {
          if (btnEnroll)
            btnEnroll.style.display =
              currentUser.role === "sinf_rahbari" ? "" : "none";
          if (btnNazorat)
            btnNazorat.style.display = ["sinf_rahbari", "oqituvchi"].includes(
              currentUser.role,
            )
              ? ""
              : "none";
          if (btnAdmin)
            btnAdmin.style.display = currentUser.role === "admin" ? "" : "none";
        }
      }

      async function logout() {
        try {
          sessionStorage.removeItem("currentUser");
          [
            "students",
            "groups",
            "courseAssignments",
            "attendance",
            "grades",
            "subjects",
            "teachers",
            "classMentors",
          ].forEach((key) => localStorage.removeItem(key));

          if (typeof auth !== "undefined" && auth.currentUser) {
            await auth.signOut();
          } else if (typeof firebase !== "undefined" && firebase.auth) {
            await firebase.auth().signOut();
          }

          window.location.replace("login.html");
        } catch (error) {
          console.error("Logout xatosi:", error);
          sessionStorage.clear();
          window.location.replace("login.html");
        }
      }

      /* ============================================================
       SANA VA QIDIRUV
       ============================================================ */

      function setCurrentDate() {
        const now = new Date();
        const day = String(now.getDate()).padStart(2, "0");
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const year = now.getFullYear();
        const el = document.getElementById("currentDate");
        if (el) el.textContent = `${day}.${month}.${year}`;
      }

      function setupSearch() {
        const searchInput = document.getElementById("searchInput");
        const searchResults = document.getElementById("searchResults");
        if (!searchInput || !searchResults) return;

        searchInput.addEventListener("input", (e) => {
          const query = e.target.value.trim().toLowerCase();
          if (query.length < 2) {
            searchResults.classList.remove("show");
            return;
          }

          const students = JSON.parse(localStorage.getItem("students") || "[]");
          const filtered = students
            .filter((s) => {
              const name = (s.fullName || "").toLowerCase();
              const group = (s.groupCode || "").toLowerCase();
              return name.includes(query) || group.includes(query);
            })
            .slice(0, 15);

          if (filtered.length === 0) {
            searchResults.innerHTML =
              '<div class="search-no-results">Hech narsa topilmadi</div>';
          } else {
            searchResults.innerHTML = filtered
              .map(
                (s) => `
              <div class="search-result-item" onclick="
                document.getElementById('searchResults').classList.remove('show');
                document.getElementById('searchInput').value='';
                openStudentDetail(${s.id}, '${s.groupCode}')
              ">
                <span class="student-name">${s.fullName}</span>
                <span class="student-group">${s.groupCode}-guruh</span>
              </div>`,
              )
              .join("");
          }
          searchResults.classList.add("show");
        });

        document.addEventListener("click", (e) => {
          if (!e.target.closest(".search-wrapper")) {
            searchResults.classList.remove("show");
          }
        });
      }

      function goToKursNazorat() {
        if (currentUser && currentUser.role === "sinf_rahbari") {
          window.location.href = "kursNazorat.html";
          return;
        }
        showToast(
          "Kursga yozish faqat sinf rahbari panelida bajariladi.",
          "warning",
        );
      }

      /* ============================================================
       GURUH KARTALARI
       ============================================================ */

      function renderGroupCards() {
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );

        const groups1 = [
          "101",
          "102",
          "103",
          "104",
          "105",
          "106",
          "107",
          "108",
        ];
        const groups2 = [
          "201",
          "202",
          "203",
          "204",
          "205",
          "206",
          "207",
          "208",
        ];

        const grid1 = document.getElementById("groups1Grid");
        const grid2 = document.getElementById("groups2Grid");
        if (!grid1 || !grid2) return;

        grid1.innerHTML = groups1
          .map((code) => {
            const count = new Set(
              assignments
                .filter((a) => a.groupCode === code)
                .map((a) => a.studentId),
            ).size;
            return renderGroupCard(code, count);
          })
          .join("");

        grid2.innerHTML = groups2
          .map((code) => {
            const count = new Set(
              assignments
                .filter((a) => a.groupCode === code)
                .map((a) => a.studentId),
            ).size;
            return renderGroupCard(code, count);
          })
          .join("");
      }

      function renderGroupCard(code, enrolledCount) {
        const isActive = activeTableGroup === code;
        return `
        <div class="group-card ${isActive ? "active" : ""}"
             onclick="toggleGroupTable('${code}')"
             id="groupCard_${code}">
          <div class="group-card-code">${code}</div>
          <div class="group-card-label">${code}-guruh</div>
          <div class="group-card-count">${enrolledCount > 0 ? enrolledCount + " ta yozilgan" : "hali yo'q"}</div>
        </div>`;
      }

      function toggleGroupTable(groupCode) {
        const course1 = [
          "101",
          "102",
          "103",
          "104",
          "105",
          "106",
          "107",
          "108",
        ];
        const wrapperId = course1.includes(groupCode)
          ? "tableWrapper1"
          : "tableWrapper2";
        const wrapper = document.getElementById(wrapperId);
        if (!wrapper) return;

        // Xuddi shu guruh bosilsa — yopish
        if (activeTableGroup === groupCode) {
          wrapper.style.display = "none";
          wrapper.classList.remove("show");
          const card = document.getElementById(`groupCard_${groupCode}`);
          if (card) card.classList.remove("active");
          activeTableGroup = null;
          return;
        }

        // Eski aktiv kartani tozalash
        if (activeTableGroup) {
          const oldCard = document.getElementById(
            `groupCard_${activeTableGroup}`,
          );
          if (oldCard) oldCard.classList.remove("active");
          ["tableWrapper1", "tableWrapper2"].forEach((id) => {
            const w = document.getElementById(id);
            if (w) {
              w.style.display = "none";
              w.classList.remove("show");
            }
          });
        }

        activeTableGroup = groupCode;
        const activeCard = document.getElementById(`groupCard_${groupCode}`);
        if (activeCard) activeCard.classList.add("active");

        const allStudents = JSON.parse(
          localStorage.getItem("students") || "[]",
        );
        const groupStudents = allStudents
          .filter((s) => s.groupCode === groupCode)
          .sort((a, b) => (a.fullName || "").localeCompare(b.fullName || ""));

        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );

        let tableHtml = `
        <div class="group-table-header">
          <h3>${groupCode}-guruh o'quvchilari (jami: ${groupStudents.length})</h3>
          <span class="close-table" onclick="toggleGroupTable('${groupCode}')">✕</span>
        </div>`;

        // Kurs statistika tugmalari
        const groupCourses = {};
        assignments
          .filter((a) => a.groupCode === groupCode)
          .forEach((a) => {
            const key = `${a.subjectId}_${a.teacherId}_${a.classTime || ""}`;
            if (!groupCourses[key]) {
              groupCourses[key] = {
                subjectId: a.subjectId,
                subjectName: a.subjectName,
                teacherId: a.teacherId,
                teacherName: a.teacherName,
                classTime: a.classTime || "",
                weekDays: a.weekDays || a.weekdays || [],
              };
            }
          });

        const gcList = Object.values(groupCourses);
        if (gcList.length > 0) {
          const btns = gcList
            .map((c) => {
              const safeArgs = `'${c.subjectId}','${c.teacherId}','${(c.classTime || "").replace(/'/g, "\\'")}','${groupCode}'`;
              const timeLabel = c.classTime ? ` — ${c.classTime}` : "";
              return `<button class="btn-course-stat" onclick="openGcStatsModal(${safeArgs})">
                <i class="fa-solid fa-chart-bar"></i> ${c.subjectName}${timeLabel}
              </button>`;
            })
            .join("");
          tableHtml += `
          <div class="group-course-stats-bar">
            <span class="group-course-stats-bar-label">
              <i class="fa-solid fa-chart-bar"></i> Kurs statistikasi:
            </span>
            ${btns}
          </div>`;
        }

        if (groupStudents.length === 0) {
          tableHtml +=
            '<div class="table-empty">Bu guruhda o\'quvchilar topilmadi.</div>';
        } else {
          tableHtml += `
          <table class="enrolled-table">
            <thead>
              <tr>
                <th>#</th>
                <th>O'quvchi F.I.Sh</th>
                <th>Guruhi</th>
                <th>Kurslari</th>
              </tr>
            </thead>
            <tbody>`;

          groupStudents.forEach((student, i) => {
            const studentCourses = assignments.filter(
              (a) => String(a.studentId) === String(student.id),
            );
            const courseCounts = {};
            studentCourses.forEach((c) => {
              const name = c.subjectName || c.subjectId || "Kurs";
              courseCounts[name] = (courseCounts[name] || 0) + 1;
            });

            let coursesHtml = "";
            const courseNames = Object.keys(courseCounts);
            if (courseNames.length === 0) {
              coursesHtml =
                '<span class="no-course-label">hali yozilmagan</span>';
            } else {
              coursesHtml = courseNames
                .map((name) => {
                  const count = courseCounts[name];
                  return `<span class="course-name-badge">${name}${count > 1 ? " ×" + count : ""}</span>`;
                })
                .join("");
            }

            const rowAttrs =
              studentCourses.length > 0
                ? `onclick="openStudentDetail(${student.id}, '${groupCode}')" class="clickable-row"`
                : "";

            tableHtml += `
            <tr ${rowAttrs}>
              <td>${i + 1}</td>
              <td>${student.fullName}</td>
              <td>${student.groupCode}</td>
              <td><div class="course-name-badges-wrap">${coursesHtml}</div></td>
            </tr>`;
          });

          tableHtml += "</tbody></table>";
        }

        wrapper.innerHTML = tableHtml;
        wrapper.style.display = "block";
        wrapper.classList.add("show");
        wrapper.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      /* ============================================================
       O'QUVCHI TAFSILOTLARI MODALI
       ============================================================ */

      const SUBJECT_COLORS = {
        Tarix: "#00e676",
        "Ona-tili va adabiyot": "#ff9800",
        "Rus tili": "#e91e63",
        "Ingliz tili": "#448aff",
        "Fransuz tili": "#7c4dff",
        "Nemis tili": "#ff5722",
        "Informatika fani": "#00bcd4",
        "Matematika fani": "#ffc107",
        "Fizika fani": "#9c27b0",
        "Jismoniy tarbiya": "#4caf50",
        Huquqshunoslik: "#795548",
        Geografiya: "#009688",
        "Kimyo fani": "#f44336",
        "Biologiya fani": "#8bc34a",
        "Kasbiy fan": "#607d8b",
        "Maxsus fan": "#ff5252",
      };

      const UZ_WEEKDAYS = [
        "Yakshanba",
        "Dushanba",
        "Seshanba",
        "Chorshanba",
        "Payshanba",
        "Juma",
        "Shanba",
      ];

      function todayDateStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function calcPeriod(mode) {
        const now = new Date();
        const today = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
        );
        if (mode === "weekly") {
          const dow = today.getDay();
          const diff = dow === 0 ? -6 : 1 - dow;
          const mon = new Date(today);
          mon.setDate(today.getDate() + diff);
          const sun = new Date(mon);
          sun.setDate(mon.getDate() + 6);
          return { start: mon, end: sun };
        }
        return {
          start: new Date(today.getFullYear(), today.getMonth(), 1),
          end: today,
        };
      }

      function dateObjToStr(d) {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function countExpectedSessions(days, start, end) {
        if (!days || !days.length) return 0;
        let n = 0;
        const d = new Date(start);
        while (d <= end) {
          if (days.includes(UZ_WEEKDAYS[d.getDay()])) n++;
          d.setDate(d.getDate() + 1);
        }
        return n;
      }

      function openStudentDetail(studentId, groupCode) {
        const allStudents = JSON.parse(
          localStorage.getItem("students") || "[]",
        );
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );
        const allAttendance = JSON.parse(
          localStorage.getItem("attendance") || "[]",
        );
        const allGrades = JSON.parse(localStorage.getItem("grades") || "[]");

        const student = allStudents.find(
          (s) => String(s.id) === String(studentId),
        );
        if (!student) return;

        const today = new Date();
        const todayStr = todayDateStr();
        const todayWeekDay = UZ_WEEKDAYS[today.getDay()];

        document.getElementById("sdmStudentName").textContent =
          student.fullName;
        document.getElementById("sdmStudentGroup").textContent =
          `${student.groupCode}-guruh`;
        document.getElementById("sdmTodayDate").textContent =
          `${String(today.getDate()).padStart(2, "0")}.${String(today.getMonth() + 1).padStart(2, "0")}.${today.getFullYear()}`;

        const studentCourses = assignments.filter(
          (a) => String(a.studentId) === String(studentId),
        );
        const contentEl = document.getElementById("sdmCoursesContent");

        if (studentCourses.length === 0) {
          contentEl.innerHTML =
            '<div class="table-empty">Bu o\'quvchi hali hech qaysi kursga yozilmagan.</div>';
          openModal("studentDetailModal");
          return;
        }

        // Hafta boshlari
        const weekDow = today.getDay();
        const weekDiff = weekDow === 0 ? -6 : 1 - weekDow;
        const weekStart = new Date(
          today.getFullYear(),
          today.getMonth(),
          today.getDate() + weekDiff,
        );
        const weekStartStr = dateObjToStr(weekStart);
        const monthStartStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-01`;

        let html = '<div class="sdm-courses-grid">';

        studentCourses.forEach((course) => {
          const color = SUBJECT_COLORS[course.subjectName] || "#448aff";
          const courseWeekDays = course.weekDays || course.weekdays || [];
          const isTodayClassDay = courseWeekDays.includes(todayWeekDay);
          const courseTime = (course.classTime || "").trim();

          // Bugungi davomat holati
          let davomatHtml = "";
          if (!isTodayClassDay) {
            davomatHtml =
              '<span class="sdm-davomat-noclass">📅 Bugun kurs yo\'q</span>';
          } else {
            davomatHtml =
              '<span class="sdm-davomat-pending">⏳ Hali olinmagan</span>';
            const todayRecord = allAttendance.find(
              (att) =>
                att.date === todayStr &&
                String(att.subjectId) === String(course.subjectId) &&
                String(att.teacherId) === String(course.teacherId) &&
                (courseTime
                  ? (att.classTime || "").trim() === courseTime
                  : true),
            );
            if (todayRecord) {
              const rec = (todayRecord.records || []).find(
                (r) => String(r.studentId) === String(studentId),
              );
              if (rec) {
                davomatHtml =
                  rec.status === "kelgan"
                    ? '<span class="davomat-badge davomat-kelgan">✓ Bugungi darsga Keldi</span>'
                    : '<span class="davomat-badge davomat-kelmagan">✕ Kelmadi</span>';
              }
            }
          }

          html += `
          <div class="sdm-course-card" style="border-left:3px solid ${color};">
            <div class="sdm-card-top">
              <div class="sdm-card-subject" style="color:${color};">${course.subjectName}</div>
              ${davomatHtml}
            </div>
            <div class="sdm-card-row">
              <span class="sdm-label"><i class="fa-solid fa-user-graduate"></i> O'qituvchi:</span>
              <span class="sdm-value">${course.teacherName}</span>
            </div>
            <div class="sdm-card-row">
              <span class="sdm-label"><i class="fa-solid fa-clock"></i> Dars vaqti:</span>
              <span class="sdm-value">${course.classTime || "—"}</span>
            </div>
            <div class="sdm-card-row">
              <span class="sdm-label"><i class="fa-solid fa-calendar-days"></i> Hafta kunlari:</span>
              <div class="weekday-small-badges">
                ${courseWeekDays
                  .map(
                    (d) =>
                      `<span class="weekday-small-badge${d === todayWeekDay ? " weekday-today" : ""}">${d.substring(0, 3)}</span>`,
                  )
                  .join("")}
              </div>
            </div>`;

          // Haftalik / oylik davomatlar
          function getStats(mode) {
            const { start, end } = calcPeriod(mode);
            const startStr = dateObjToStr(start);
            const endStr = dateObjToStr(end);

            const recs = allAttendance.filter(
              (att) =>
                String(att.subjectId) === String(course.subjectId) &&
                String(att.teacherId) === String(course.teacherId) &&
                (att.classTime || "").trim() === courseTime &&
                att.date >= startStr &&
                att.date <= endStr,
            );

            const held = new Set(recs.map((a) => a.date)).size;
            const expected = Math.max(
              countExpectedSessions(courseWeekDays, start, end),
              held,
            );
            let attended = 0,
              missed = 0;

            recs.forEach((att) => {
              const r = (att.records || []).find(
                (r) => String(r.studentId) === String(studentId),
              );
              if (r?.status === "kelgan") attended++;
              else if (r?.status === "kelmagan") missed++;
            });

            return {
              attended,
              missed,
              held,
              expected,
              unrecorded: Math.max(expected - held, 0),
            };
          }

          function chipHtml(label, stat) {
            const { expected, attended, missed, unrecorded, held } = stat;
            if (expected === 0) {
              return `
              <div class="sdm-stat-chip sdm-stat-chip-empty">
                <div class="sdm-stat-chip-label">${label}</div>
                <div class="sdm-stat-chip-nums tone-muted">Dars yo'q</div>
                <div class="sdm-stat-bar-bg"><div class="sdm-stat-bar-fill w-0"></div></div>
              </div>`;
            }
            const attendedPct = Math.round((attended / expected) * 100);
            const missedPct = Math.round((missed / expected) * 100);
            const unrecordedPct = Math.max(0, 100 - attendedPct - missedPct);
            const statusTone =
              held === 0 ? "tone-warn" : toneClass(attendedPct);
            const statusText =
              held === 0
                ? "Davomat olinmagan"
                : `${attended}/${expected} darsga kelgan`;

            return `
            <div class="sdm-stat-chip sdm-stat-chip-pro">
              <div class="sdm-stat-chip-label">${label}</div>
              <div class="sdm-stat-chip-nums ${statusTone}">${statusText}</div>
              <div class="sdm-stat-mini-grid">
                <div class="sdm-stat-mini is-total">
                  <div class="sdm-stat-mini-label">Jami</div>
                  <div class="sdm-stat-mini-num">${expected}</div>
                </div>
                <div class="sdm-stat-mini is-present">
                  <div class="sdm-stat-mini-label">Kelgan</div>
                  <div class="sdm-stat-mini-num">${attended}</div>
                </div>
                <div class="sdm-stat-mini is-absent">
                  <div class="sdm-stat-mini-label">Kelmagan</div>
                  <div class="sdm-stat-mini-num">${missed}</div>
                </div>
                <div class="sdm-stat-mini is-unrecorded">
                  <div class="sdm-stat-mini-label">Olinmagan</div>
                  <div class="sdm-stat-mini-num">${unrecorded}</div>
                </div>
              </div>
              <div class="sdm-stacked-bar">
                <div class="sdm-stat-segment is-present ${widthClass(attendedPct)}"></div>
                <div class="sdm-stat-segment is-absent ${widthClass(missedPct)}"></div>
                <div class="sdm-stat-segment is-unrecorded ${widthClass(unrecordedPct)}"></div>
              </div>
            </div>`;
          }

          html += `<div class="sdm-stats-row">
            ${chipHtml("Bu hafta", getStats("weekly"))}
            ${chipHtml("Bu oy", getStats("monthly"))}
          </div>`;

          // Baholar bo'limi
          function gradeDateLabel(value) {
            if (!value) return "—";
            const p = String(value).split("-");
            return p.length === 3 ? `${p[2]}.${p[1]}` : String(value);
          }

          const studentGradeEntries = allGrades
            .filter((g) => {
              const gradeTime = (g.classTime || "").trim();
              return (
                String(g.subjectId) === String(course.subjectId) &&
                String(g.teacherId) === String(course.teacherId) &&
                (courseTime ? gradeTime === courseTime : true)
              );
            })
            .flatMap((gr) => {
              const sg = (gr.grades || []).find(
                (g) => String(g.studentId) === String(studentId),
              );
              return sg
                ? [
                    {
                      date: gr.date || "",
                      classTime: gr.classTime || course.classTime || "",
                      grade: sg.grade,
                    },
                  ]
                : [];
            })
            .sort((a, b) => String(b.date).localeCompare(String(a.date)));

          const todayGrades = studentGradeEntries.filter(
            (g) => g.date === todayStr,
          );
          const weekGrades = studentGradeEntries.filter(
            (g) => g.date >= weekStartStr && g.date <= todayStr,
          );
          const monthGrades = studentGradeEntries.filter(
            (g) => g.date >= monthStartStr && g.date <= todayStr,
          );

          function gradeBadges(entries) {
            if (!entries.length)
              return '<span class="grade-empty">baho yo\'q</span>';
            return entries
              .map(
                (g) =>
                  `<span class="grade-badge grade-${g.grade}" title="${gradeDateLabel(g.date)} | ${g.classTime}">${g.grade}</span>`,
              )
              .join(" ");
          }
          function avgGrade(entries) {
            const nums = entries
              .map((g) => Number(g.grade))
              .filter(Number.isFinite);
            return nums.length
              ? (nums.reduce((a, b) => a + b, 0) / nums.length).toFixed(1)
              : "—";
          }

          html += `
          <div class="sdm-grades-section">
            <div class="sdm-section-title"><i class="fa-solid fa-star"></i> Baholar</div>
            <div class="grade-panel">
              <div class="grade-line">
                <div class="grade-line-title">Bugun</div>
                <div class="grade-line-body">${gradeBadges(todayGrades)}</div>
              </div>
              <div class="grade-line">
                <div class="grade-line-title">Bu hafta</div>
                <div class="grade-line-body">
                  ${gradeBadges(weekGrades)}
                  <div class="grade-meta">Soni: ${weekGrades.length} ta</div>
                </div>
              </div>
              <div class="grade-line">
                <div class="grade-line-title">Bu oy</div>
                <div class="grade-line-body">
                  ${gradeBadges(monthGrades.slice(0, 8))}
                  <div class="grade-meta grade-meta-success">O'rtacha: ${avgGrade(monthGrades)}</div>
                  <div class="grade-meta">Soni: ${monthGrades.length} ta</div>
                </div>
              </div>
            </div>
            ${
              studentGradeEntries.length
                ? `<div class="grade-history">
                    ${studentGradeEntries
                      .slice(0, 8)
                      .map(
                        (g) =>
                          `<span>${gradeDateLabel(g.date)}: <b class="grade-history-value">${g.grade}</b></span>`,
                      )
                      .join('<span class="grade-dot">•</span>')}
                  </div>`
                : ""
            }
          </div>
          </div>`;
        });

        html += "</div>";
        contentEl.innerHTML = html;
        openModal("studentDetailModal");
      }

      /* ============================================================
       GURUH KURSI STATISTIKASI
       ============================================================ */

      const _UZ_DAYS = [
        "Yakshanba",
        "Dushanba",
        "Seshanba",
        "Chorshanba",
        "Payshanba",
        "Juma",
        "Shanba",
      ];

      function _dateToStr(d) {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function _countExpected(days, start, end) {
        if (!days || !days.length) return 0;
        let n = 0;
        const d = new Date(start);
        while (d <= end) {
          if (days.includes(_UZ_DAYS[d.getDay()])) n++;
          d.setDate(d.getDate() + 1);
        }
        return n;
      }

      function _getDateRange(mode) {
        const now = new Date();
        const today = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
        );
        if (mode === "weekly") {
          const dow = today.getDay();
          const diff = dow === 0 ? -6 : 1 - dow;
          const mon = new Date(today);
          mon.setDate(today.getDate() + diff);
          const sun = new Date(mon);
          sun.setDate(mon.getDate() + 6);
          return { start: mon, end: sun };
        }
        return {
          start: new Date(today.getFullYear(), today.getMonth(), 1),
          end: today,
        };
      }

      function openGcStatsModal(subjectId, teacherId, classTime, groupCode) {
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );
        const course = assignments.find(
          (a) =>
            String(a.subjectId) === String(subjectId) &&
            String(a.teacherId) === String(teacherId) &&
            (a.classTime || "") === (classTime || "") &&
            a.groupCode === groupCode,
        );

        currentGcCourse = {
          subjectId,
          teacherId,
          classTime,
          groupCode,
          weekDays: course?.weekDays || course?.weekdays || [],
        };
        currentGcMode = "weekly";

        const color = SUBJECT_COLORS[course?.subjectName] || "#448aff";
        const icon = document.getElementById("gcStatsIcon");
        icon.style.background = color + "22";
        icon.innerHTML = `<i class="fa-solid fa-chart-bar" style="color:${color};"></i>`;

        document.getElementById("gcStatsTitle").textContent =
          (course?.subjectName || "Kurs") + " — " + groupCode + "-guruh";
        document.getElementById("gcStatsSubTitle").textContent =
          `${course?.teacherName || ""} | ${classTime || ""}`;

        document.getElementById("gcTabWeekly").classList.add("active");
        document.getElementById("gcTabMonthly").classList.remove("active");

        renderGcStats("weekly");
        openModal("gcStatsModal");
      }

      function switchGcTab(mode) {
        currentGcMode = mode;
        document
          .getElementById("gcTabWeekly")
          .classList.toggle("active", mode === "weekly");
        document
          .getElementById("gcTabMonthly")
          .classList.toggle("active", mode === "monthly");
        renderGcStats(mode);
      }

      function renderGcStats(mode) {
        if (!currentGcCourse) return;
        const { subjectId, teacherId, classTime, groupCode, weekDays } =
          currentGcCourse;

        const { start, end } = _getDateRange(mode);
        const startStr = _dateToStr(start);
        const endStr = _dateToStr(end);

        const allAttendance = JSON.parse(
          localStorage.getItem("attendance") || "[]",
        );
        const assignments = JSON.parse(
          localStorage.getItem("courseAssignments") || "[]",
        );

        // Bu kursga yozilgan o'quvchilar
        const courseStudents = [];
        const seenIds = new Set();
        assignments
          .filter(
            (a) =>
              String(a.subjectId) === String(subjectId) &&
              String(a.teacherId) === String(teacherId) &&
              (a.classTime || "").trim() === (classTime || "").trim() &&
              a.groupCode === groupCode,
          )
          .forEach((a) => {
            if (!seenIds.has(a.studentId)) {
              seenIds.add(a.studentId);
              courseStudents.push({
                studentId: a.studentId,
                studentName: a.studentName,
              });
            }
          });

        // Davomat yozuvlari
        const recs = allAttendance.filter(
          (att) =>
            String(att.subjectId) === String(subjectId) &&
            String(att.teacherId) === String(teacherId) &&
            (att.classTime || "").trim() === (classTime || "").trim() &&
            att.date >= startStr &&
            att.date <= endStr,
        );

        const expectedBySchedule = _countExpected(weekDays, start, end);
        const held = new Set(recs.map((a) => a.date)).size;
        const expected = Math.max(expectedBySchedule, held);
        const unrecorded = Math.max(expected - held, 0);
        const pctHeld = expected > 0 ? Math.round((held / expected) * 100) : 0;
        const periodLabel = mode === "weekly" ? "Bu hafta" : "Bu oy";

        // Har o'quvchi statistikasi
        const statsMap = {};
        courseStudents.forEach((s) => {
          statsMap[s.studentId] = { ...s, attended: 0, missed: 0, unrecorded };
        });
        recs.forEach((att) => {
          (att.records || []).forEach((r) => {
            if (statsMap[r.studentId]) {
              if (r.status === "kelgan") statsMap[r.studentId].attended++;
              else if (r.status === "kelmagan") statsMap[r.studentId].missed++;
            }
          });
        });

        const statsArr = Object.values(statsMap).sort(
          (a, b) => b.attended - a.attended,
        );

        // Xulosa kartalar
        document.getElementById("gcStatsSummary").innerHTML = `
        <div class="gcs-summary-cards">
          <div class="gcs-summary-card">
            <div class="gcs-summary-num">${expected}</div>
            <div class="gcs-summary-label">${periodLabel} kutilgan</div>
          </div>
          <div class="gcs-summary-card">
            <div class="gcs-summary-num ${toneClass(pctHeld)}">${held}</div>
            <div class="gcs-summary-label">Davomat olingan</div>
          </div>
          <div class="gcs-summary-card">
            <div class="gcs-summary-num ${unrecorded > 0 ? "tone-warn" : "tone-good"}">${unrecorded}</div>
            <div class="gcs-summary-label">Olinmagan</div>
          </div>
        </div>`;

        if (expected === 0) {
          document.getElementById("gcStatsTable").innerHTML =
            `<div class="table-empty">📭 ${periodLabel} uchun jadval yoki davomat topilmadi.</div>`;
          return;
        }

        let rows = "";
        statsArr.forEach((s, i) => {
          const pct =
            expected > 0 ? Math.round((s.attended / expected) * 100) : 0;
          rows += `
          <tr>
            <td>${String(i + 1).padStart(2, "0")}</td>
            <td class="stats-cell-name">${s.studentName}</td>
            <td class="stats-cell-present">${s.attended}</td>
            <td class="stats-cell-absent">${s.missed}</td>
            <td class="stats-cell-unrecorded">${s.unrecorded}</td>
            <td>
              <div class="gcs-pct-wrap">
                <div class="gcs-pct-bg">
                  <div class="gcs-pct-fill ${widthClass(pct)} ${toneClass(pct)}"></div>
                </div>
                <span class="gcs-pct-label ${toneClass(pct)}">${pct}%</span>
              </div>
            </td>
          </tr>`;
        });

        document.getElementById("gcStatsTable").innerHTML = `
        <table class="gcs-table">
          <thead>
            <tr>
              <th>#</th>
              <th>O'quvchi</th>
              <th>Keldi</th>
              <th>Kelmadi</th>
              <th>Olinmagan</th>
              <th>Davomat %</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
      }

      /* ============================================================
       MODAL BOSHQARUVI
       ============================================================ */

      function openModal(modalId) {
        const el = document.getElementById(modalId);
        if (el) {
          el.classList.add("show");
          document.body.style.overflow = "hidden";
        }
      }

      function closeModal(modalId) {
        const el = document.getElementById(modalId);
        if (el) {
          el.classList.remove("show");
          document.body.style.overflow = "";
        }
      }

      document.querySelectorAll(".modal-overlay").forEach((overlay) => {
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) {
            overlay.classList.remove("show");
            document.body.style.overflow = "";
          }
        });
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          document.querySelectorAll(".modal-overlay.show").forEach((m) => {
            m.classList.remove("show");
          });
          document.body.style.overflow = "";
        }
      });

      /* ============================================================
       TOAST XABARLARI
       ============================================================ */

      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        if (!container) return;
        const icons = {
          success: '<i class="fa-solid fa-circle-check"></i>',
          error: '<i class="fa-solid fa-circle-xmark"></i>',
          warning: '<i class="fa-solid fa-triangle-exclamation"></i>',
          info: '<i class="fa-solid fa-circle-info"></i>',
        };
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span class="toast-icon">${icons[type] || icons.info}</span><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateX(100px)";
          toast.style.transition = "all 0.3s ease";
          setTimeout(() => toast.remove(), 300);
        }, 4000);
      }
    </script>
  </body>
</html>
