<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirish — Kurs Nazorat Tizimi</title>
  <meta name="description" content="IIV Buxoro Akademik Litseyi kurs nazorati va davomat boshqaruvi tizimiga kirish" />
  <link rel="icon" type="image/png" href="../imgs/logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== LOGIN SAHIFASI ===== -->
  <div class="login-page">
    <div class="login-card" id="loginCard">

      <!-- Sarlavha -->
      <div class="login-header">
        <div class="login-logo">📋</div>
        <h1>Kurs Nazorat Tizimi</h1>
        <p>IIV Buxoro Akademik Litseyi</p>
      </div>

      <!-- Tab tugmalari: Sinf rahbari / O'qituvchi -->
      <div class="login-tabs" id="loginTabs">
        <button class="login-tab active" data-role="sinf_rahbari" id="tabMentor">
          Sinf rahbari
        </button>
        <button class="login-tab" data-role="oqituvchi" id="tabTeacher">
          O'qituvchi
        </button>
      </div>

      <!-- Xato xabari -->
      <div class="login-error" id="loginError">
        Login yoki parol noto'g'ri. Qaytadan urinib ko'ring.
      </div>

      <!-- Login formasi -->
      <form class="login-form" id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="loginInput">Login</label>
          <input
            type="text"
            id="loginInput"
            class="form-input"
            placeholder="Loginni kiriting"
            autocomplete="off"
            required
          />
        </div>

        <div class="form-group">
          <label for="passwordInput">Parol</label>
          <input
            type="password"
            id="passwordInput"
            class="form-input"
            placeholder="Parolni kiriting"
            required
          />
        </div>

        <div class="login-buttons-row">
          <button type="submit" class="btn-login" id="btnLogin">
            Tizimga kirish
          </button>
          <a href="../index.html" class="btn-back-home" title="Bosh sahifaga qaytish">
            <span class="btn-back-icon">🏠</span>
          </a>
        </div>
      </form>

      <!-- Kuzatuvchi bo'limi -->
      <div class="observer-divider">yoki</div>
      <button class="btn-observer" id="btnObserver" onclick="loginAsObserver()">
        👁️ Kuzatuvchi sifatida kirish
      </button>

    </div>
  </div>

  <!-- ===== FIREBASE YUKLANADI ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>

  <script>
    /* ============================================================
       LOGIN SAHIFASI LOGIKASI
       ============================================================ */

    // ===== O'zgaruvchilar =====
    let currentRole = "sinf_rahbari"; // Joriy tanlangan tab (sinf_rahbari / oqituvchi)

    // ===== DOM elementlari =====
    const loginTabs = document.querySelectorAll(".login-tab");
    const loginForm = document.getElementById("loginForm");
    const loginInput = document.getElementById("loginInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginError = document.getElementById("loginError");

    // ===== TAB ALMASHISH =====
    loginTabs.forEach(tab => {
      tab.addEventListener("click", () => {
        // Barcha tablardan "active" ni olib tashla
        loginTabs.forEach(t => t.classList.remove("active"));
        // Bosilgan tabga "active" qo'sh
        tab.classList.add("active");
        // Rolni yangila
        currentRole = tab.dataset.role;
        // Xato xabarini yashir
        loginError.classList.remove("show");
        // Placeholder'larni yangilab qo'y
        if (currentRole === "sinf_rahbari") {
          loginInput.placeholder = "Masalan: mentor101";
          passwordInput.placeholder = "Masalan: 1010";
        } else {
          loginInput.placeholder = "Masalan: teacher001";
          passwordInput.placeholder = "Masalan: 0010";
        }
        // Inputlarni tozala
        loginInput.value = "";
        passwordInput.value = "";
        loginInput.focus();
      });
    });

    // ===== LOGIN TEKSHIRISH =====
    async function handleLogin(e) {
      e.preventDefault();

      const login = loginInput.value.trim();
      const password = passwordInput.value.trim();

      // Bo'sh maydonlarni tekshir
      if (!login || !password) {
        showError("Iltimos, login va parolni kiriting.");
        return false;
      }

      const btn = document.getElementById("btnLogin");
      const originalText = btn.textContent;
      btn.textContent = "Tekshirilmoqda...";
      btn.disabled = true;

      try {
        if (currentRole === "sinf_rahbari") {
          // Sinf rahbarlaridan qidirish (Firebase)
          const snapshot = await db.collection("classMentors").where("login", "==", login).get();

          if (!snapshot.empty) {
            const mentor = snapshot.docs[0].data();
            if (mentor.password === password) {
              // Muvaffaqiyatli kirish — sessiyaga yozish
              const userData = {
                role: "sinf_rahbari",
                login: mentor.login,
                groupCode: mentor.groupCode,
                fullName: mentor.fullName,
                id: mentor.id
              };
              sessionStorage.setItem("currentUser", JSON.stringify(userData));
              // kursNazorat sahifasiga o'tish
              window.location.href = "kursNazorat.html";
            } else {
              showError("Parol noto'g'ri!");
            }
          } else {
            showError("Bunday login (sinf rahbari) mavjud emas!");
          }

        } else if (currentRole === "oqituvchi") {
          // O'qituvchilardan qidirish (Firebase)
          const snapshot = await db.collection("teachers").where("login", "==", login).get();

          if (!snapshot.empty) {
            const teacher = snapshot.docs[0].data();
            if (teacher.password === password) {
              // Muvaffaqiyatli kirish
              const userData = {
                role: "oqituvchi",
                login: teacher.login,
                subject: teacher.subject,
                fullName: teacher.fullName,
                id: teacher.id,
                password: teacher.password // Davomat tasdiqlash uchun
              };
              sessionStorage.setItem("currentUser", JSON.stringify(userData));
              window.location.href = "kursNazorat.html";
            } else {
              showError("Parol noto'g'ri!");
            }
          } else {
            showError("Bunday login (o'qituvchi) mavjud emas!");
          }
        }
      } catch (error) {
        console.error("Firebase xatosi:", error);
        showError("Tarmoqqa ulanishda xatolik yuz berdi!");
      }

      btn.textContent = originalText;
      btn.disabled = false;
      return false;
    }

    // ===== KUZATUVCHI SIFATIDA KIRISH =====
    function loginAsObserver() {
      const userData = {
        role: "kuzatuvchi",
        login: "kuzatuvchi",
        fullName: "Kuzatuvchi",
      };
      sessionStorage.setItem("currentUser", JSON.stringify(userData));
      // Kuzatuvchi faqat yozilganlar sahifasini ko'radi
      window.location.href = "kursgaYozilganlar.html";
    }

    // ===== XATO XABARI =====
    function showError(message) {
      loginError.textContent = message;
      loginError.classList.add("show");
      // 4 soniyadan keyin yashir
      setTimeout(() => loginError.classList.remove("show"), 4000);
    }

    // ===== SAHIFA YUKLANGANDA =====
    document.addEventListener("DOMContentLoaded", () => {
      // Agar allaqachon login bo'lgan bo'lsa, kursNazorat'ga yo'naltiramiz
      const existingUser = sessionStorage.getItem("currentUser");
      if (existingUser) {
        window.location.href = "kursNazorat.html";
        return;
      }
      // Birinchi input ga fokus
      loginInput.focus();
      // Default placeholder
      loginInput.placeholder = "Masalan: mentor101";
      passwordInput.placeholder = "Masalan: 1010";
    });
  </script>

</body>
</html>
